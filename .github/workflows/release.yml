name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            container: rust:latest
            asset_os: linux
            asset_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            container: ghcr.io/cross-rs/aarch64-unknown-linux-gnu:latest
            asset_os: linux
            asset_arch: aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            container: ""
            asset_os: darwin
            asset_arch: x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            container: ""
            asset_os: darwin
            asset_arch: aarch64

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          archive="woti-${tag}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz"
          tar -czf "${archive}" -C "target/${{ matrix.target }}/release" woti
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: woti-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "${tag}" \
            --title "Release ${tag}" \
            --generate-notes \
            artifacts/*.tar.gz
